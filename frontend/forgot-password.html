<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Supply Feedback Portal | Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            PowerPulse
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card glass animate-fade">
            <h2>Forgot Password</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem;">Enter your email address and we'll send you a link to reset your password.</p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@company.com">
                </div>
                <button type="submit" id="sendBtn">Send Reset Link</button>
            </form>
            <div id="message" style="margin-top: 1rem; text-align: center; font-size: 0.9rem;"></div>
            <div class="auth-switch" style="margin-top: 1.5rem;">
                <a href="index.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            if (!email) {
                return showMessage('Please enter your email address', 'error');
            }
            
            showMessage('Sending reset link...', 'info');
            
            const res = await callAPI('/auth/forgot-password', 'POST', { email });
            
            showMessage(res.message || 'If an account exists, a reset link was sent.', 'success');
        });
    </script>
</body>
</html>
