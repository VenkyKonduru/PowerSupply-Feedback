<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Supply Feedback Portal | Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            PowerPulse
        </div>
    </nav>

    <div class="auth-container" style="height: 90vh;">
        <div class="auth-card glass animate-fade">
            <h2>Join PowerPulse</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required placeholder="••••••••">
                        <button type="button" class="toggle-password" tabindex="-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="role">Account Type</label>
                    <select id="role">
                        <option value="user">Resident (User)</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                <button type="submit">Create Account</button>
            </form>
            <div class="auth-switch">
                Already have an account? <a href="index.html">Sign In</a>
            </div>
            <div id="message" style="margin-top: 1rem; text-align: center; font-size: 0.9rem;"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            const res = await callAPI('/auth/register', 'POST', { name, email, password, role });
            
            if (res.message.toLowerCase().includes('successfully') || res.message.toLowerCase().includes('pending')) {
                showMessage('Registration successful! Redirecting to login...', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } else {
                showMessage(res.message || 'Registration failed', 'error');
            }
        });
    </script>
</body>
</html>
